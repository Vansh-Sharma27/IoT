pi:
  # Public URL printed by `cloudflared tunnel --url http://127.0.0.1:8000` on the VM.
  # If you registered a named tunnel, this is the stable hostname instead.
  vm_url: "https://CHANGE_ME.trycloudflare.com"
  # Must match server.secret_token in vm_server/config.yaml.
  vm_token: "CHANGE_ME"
  hardware_backend: "mock"     # "mock" for VM testing, "real" on the Pi

control:
  tick_seconds: 0.05
  forward_speed: 0.4           # 0.0 - 1.0, motor PWM duty
  turn_speed: 0.45
  trigger_distance_cm: 80      # within this distance, start counting "stable" time
  obstacle_distance_cm: 25     # within this distance, treat as a wall and turn
  stable_seconds: 1.0          # how long target must be ~stationary before capturing
  stable_delta_cm: 5           # |Δdistance| under this counts as stable
  retry_after_capture_seconds: 3.0   # don't immediately re-trigger on the same visitor

camera:
  device_index: 0
  jpeg_quality: 80
  width: 640
  height: 480

# real-hardware GPIO pin map (BCM numbering). Used only when hardware_backend == "real".
# Update these to match your wiring before powering the Pi.
gpio:
  motors:
    left_forward: 17
    left_backward: 27
    left_pwm: 18
    right_forward: 22
    right_backward: 23
    right_pwm: 13
  ultrasonic_front:
    trigger: 5
    echo: 6
  buzzer: 25
  led_red: 16
  led_green: 20
  led_amber: 21
